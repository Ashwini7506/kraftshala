# Supabase project config

project_id = "kraftshala-attendance"

[api]
enabled = true
port = 54321
schemas = ["public", "kraftshala"]
extra_search_path = ["public", "kraftshala", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[realtime]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 28800   # 8 hours for students
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # magic link only, no password confirmation
template = "default"

[edge_runtime]
enabled = true
policy = "oneshot"

[storage]
enabled = false   # not used in v1
